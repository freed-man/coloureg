{% extends "base.html" %}
{% load static %}

{% block extra_title %} - Paint Code Finder{% endblock %}

{% block extra_css %}
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/uk-number-plate" rel="stylesheet">
<style>
    #particles-js {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        background: #fff;
    }
    #particles-js canvas {
        display: block;
        vertical-align: bottom;
    }
    .navbar {
        background: transparent !important;
        position: relative;
        z-index: 2;
        pointer-events: none;
    }
    .navbar a {
        pointer-events: auto;
    }
    .content-wrapper {
        position: relative;
        z-index: 1;
        pointer-events: none;
    }
    .content-wrapper form,
    .content-wrapper a,
    .content-wrapper input,
    .content-wrapper button {
        pointer-events: auto;
    }
    .title-row {
        flex-wrap: wrap;
    }
    .plate-badge {
        display: inline-flex;
        border: 2px solid #333;
        border-radius: 6px;
        overflow: hidden;
        opacity: 0.85;
    }
    .plate-badge .gb-strip {
        background: #003399;
        padding: 2px 5px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .plate-badge .plate-text {
        padding: 2px 12px;
        font-weight: 900;
        letter-spacing: 2px;
        color: #000;
    }
    .plate-badge.paint .plate-text {
        background: #fff;
    }
    .plate-badge.code .plate-text {
        background: #f5c518;
    }
    .search-container {
        max-width: 300px;
        margin: 0 auto;
        width: 100%;
        padding: 0 16px;
    }
    .search-form {
        display: flex;
        align-items: stretch;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        padding-left: 12px;
        overflow: hidden;
    }
    .search-input {
        flex: 1;
        min-width: 0;
        border: none;
        padding: 12px 0;
        font-size: 30px;
        outline: none;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-family: 'UK Number Plate', 'Arial Black', sans-serif;
        font-weight: 900;
        color: #000;
        background: transparent;
        width: 100%;
        text-align: center;
    }
    .search-input::placeholder {
        color: #555;
        font-weight: 400;
        font-size: 22px;
        letter-spacing: 1px;
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        text-transform: none;
    }
    .search-btn {
        border: none;
        padding: 0 18px;
        cursor: pointer;
        background: #C8102E;
        color: #fff;
        font-size: 18px;
        transition: background 1s ease-in-out;
    }

    /* Tablet and below */
    @media (max-width: 768px) {
        .main-title {
            font-size: 1.6rem;
        }
        .plate-badge .plate-text {
            padding: 2px 10px;
            letter-spacing: 1.5px;
        }
        .search-input {
            font-size: 26px;
            letter-spacing: 2px;
            padding: 10px 0;
        }
        .search-input::placeholder {
            font-size: 18px;
        }
        .search-btn {
            padding: 0 14px;
            font-size: 16px;
        }
    }

    /* Mobile */
    @media (max-width: 480px) {
        .main-title {
            font-size: 1.3rem;
            gap: 6px !important;
        }
        .plate-badge .plate-text {
            padding: 2px 8px;
            letter-spacing: 1px;
        }
        .plate-badge .gb-strip small {
            font-size: 0.25em !important;
        }
        .search-input {
            font-size: 22px;
            letter-spacing: 2px;
        }
        .search-input::placeholder {
            font-size: 16px;
        }
        .search-btn {
            padding: 0 12px;
            font-size: 15px;
        }
    }

    /* Tiny phones */
    @media (max-width: 360px) {
        .main-title {
            font-size: 1.1rem;
        }
        .search-input {
            font-size: 20px;
            letter-spacing: 1px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div id="particles-js"></div>
<div class="content-wrapper">
    <div class="container mt-5">
        <div class="row justify-content-center text-center">
            <div class="col-md-8">
                <h1 class="main-title title-row d-flex align-items-center justify-content-center gap-2 mb-5">
                    <span class="plate-badge paint">
                        <span class="gb-strip"><small style="color:#fff; font-size:0.3em; font-weight:700;">GB</small></span>
                        <span class="plate-text">PAINT</span>
                    </span>
                    <span class="plate-badge code">
                        <span class="gb-strip"><small style="color:#fff; font-size:0.3em; font-weight:700;">GB</small></span>
                        <span class="plate-text">CODE</span>
                    </span>
                    <em style="color:#333; font-weight:300;">finder</em>
                </h1>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="search-container">
                    <form method="POST" action="{% url 'index' %}" class="search-form" id="lookup-form">
                        {% csrf_token %}
                        <input type="text" class="search-input" id="reg-input"
                            name="registration" maxlength="7" placeholder="">
                        <button type="submit" class="search-btn" id="search-btn" aria-label="Search">
                            <i class="fas fa-search"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/particles.min.js' %}"></script>
<script>
    particlesJS("particles-js", {
        particles: {
            number: { value: 100, density: { enable: true, value_area: 800 } },
            color: { value: "#000000" },
            shape: { type: "circle", stroke: { width: 0, color: "#000000" } },
            opacity: { value: 0.5, random: false, anim: { enable: false, speed: 1, opacity_min: 0.1, sync: false } },
            size: { value: 3, random: true, anim: { enable: false, speed: 40, size_min: 0.1, sync: false } },
            line_linked: { enable: true, distance: 150, color: "#000000", opacity: 0.4, width: 1 },
            move: { enable: true, speed: 6, direction: "none", random: false, straight: false, out_mode: "out", bounce: false, attract: { enable: false, rotateX: 600, rotateY: 1200 } }
        },
        interactivity: {
            detect_on: "canvas",
            events: {
                onhover: { enable: true, mode: "grab" },
                onclick: { enable: true, mode: "push" },
                resize: true
            },
            modes: {
                grab: { distance: 140, line_linked: { opacity: 1 } },
                bubble: { distance: 400, size: 40, duration: 2, opacity: 8, speed: 3 },
                repulse: { distance: 200, duration: 0.4 },
                push: { particles_nb: 4 },
                remove: { particles_nb: 2 }
            }
        },
        retina_detect: true
    });
</script>
<script>
    // Random hex colour cycling on search button
    var searchBtn = document.getElementById('search-btn');

    function cycleBtnColour() {
        var random = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
        searchBtn.style.background = random;
    }

    cycleBtnColour();
    setInterval(cycleBtnColour, 1000);
</script>
<script>
    var regInput = document.getElementById('reg-input');
    var lookupForm = document.getElementById('lookup-form');

    var text = 'enter your reg...';
    var pi = 0;
    var pDeleting = false;
    var plateActive = true;

    function typePlaceholder() {
        if (!plateActive) return;
        if (!pDeleting) {
            regInput.placeholder = text.substring(0, pi);
            pi++;
            if (pi > text.length) {
                setTimeout(function() { pDeleting = true; typePlaceholder(); }, 2000);
                return;
            }
            setTimeout(typePlaceholder, 100);
        } else {
            regInput.placeholder = text.substring(0, pi);
            pi--;
            if (pi < 0) {
                pDeleting = false;
                pi = 0;
                setTimeout(typePlaceholder, 500);
                return;
            }
            setTimeout(typePlaceholder, 40);
        }
    }
    typePlaceholder();

    regInput.addEventListener('focus', function() {
        plateActive = false;
        regInput.placeholder = '';
    });

    regInput.addEventListener('blur', function() {
        if (regInput.value === '') {
            plateActive = true;
            pi = 0;
            pDeleting = false;
            typePlaceholder();
        }
    });

    lookupForm.addEventListener('submit', function(e) {
        if (regInput.value.trim() === '') {
            e.preventDefault();
            regInput.focus();
        }
    });
</script>
{% endblock %}
