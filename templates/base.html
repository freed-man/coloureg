{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <title>coloureg{% block extra_title %}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="coloureg - Find your car's paint colour code by registration number.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}
    {% endblock %}
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid justify-content-center">
            <a class="navbar-brand" href="{% url 'index' %}">
                <span class="brand-text" style="background: linear-gradient(90deg, #e74c3c, #f39c12, #f1c40f, #2ecc71, #3498db, #9b59b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                    <i class="fas fa-spray-can me-2"></i>colou<strong>reg</strong>
                </span>
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                {% for message in messages %}
                <div class="alert {{ message.tags }} alert-dismissible fade show mt-3" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"
                        aria-label="Close"></button>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <main class="container mt-4 mb-5 flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}
    {% endblock %}

    <script>
        setTimeout(function () {
            let messages = document.querySelectorAll('.alert-dismissible');
            for (let message of messages) {
                message.style.transition = 'opacity 0.5s';
                message.style.opacity = '0';
                setTimeout(function () {
                    message.remove();
                }, 500);
            }
        }, 5000);
    </script>

</body>

</html>
